spring:
  application:
    name: payment-service

payment:
  webhook:
    secret: ${PAYMENT_WEBHOOK_SECRET:dev-webhook-secret}

server:
  port: ${SERVER_PORT:8085}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
