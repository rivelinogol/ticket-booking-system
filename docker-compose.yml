services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ticketbook
      POSTGRES_PASSWORD: ticketbook
      POSTGRES_DB: ticketbook
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ticketbook -d ticketbook"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongodb-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.runCommand({ ping: 1 }).ok"]
      interval: 10s
      timeout: 5s
      retries: 10

  kafka:
    image: docker.redpanda.com/redpandadata/redpanda:v24.3.8
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp
      - "1"
      - --memory
      - "512M"
      - --reserve-memory
      - "0M"
      - --node-id
      - "0"
      - --check=false
      - --kafka-addr
      - PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr
      - PLAINTEXT://kafka:9092
    ports:
      - "9092:9092"
    volumes:
      - kafka-data:/var/lib/redpanda/data
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -q 'Healthy: *true'"]
      interval: 15s
      timeout: 10s
      retries: 15

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    ports:
      - "8087:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local-redpanda
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    depends_on:
      kafka:
        condition: service_healthy

  auth-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_MODULE: auth-service
    ports:
      - "8081:8081"
    environment:
      SERVER_PORT: 8081
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/authdb
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.postgresql.Driver
      SPRING_DATASOURCE_USERNAME: ticketbook
      SPRING_DATASOURCE_PASSWORD: ticketbook
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_SHOW_SQL: false
    depends_on:
      postgres:
        condition: service_healthy

  seat-inventory-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_MODULE: seat-inventory-service
    ports:
      - "8083:8083"
    environment:
      SERVER_PORT: 8083
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/seatdb
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.postgresql.Driver
      SPRING_DATASOURCE_USERNAME: ticketbook
      SPRING_DATASOURCE_PASSWORD: ticketbook
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_SHOW_SQL: false
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      APP_SEAT_LOCK_PROVIDER: redis
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  event-management-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_MODULE: event-management-service
    ports:
      - "8082:8082"
    environment:
      SERVER_PORT: 8082
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/eventdb
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.postgresql.Driver
      SPRING_DATASOURCE_USERNAME: ticketbook
      SPRING_DATASOURCE_PASSWORD: ticketbook
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_SHOW_SQL: false
      APP_EVENT_PERSISTENCE_PROVIDER: mongo
      SPRING_DATA_MONGODB_URI: mongodb://mongodb:27017/eventdb
      SERVICES_SEAT_INVENTORY_URL: http://seat-inventory-service:8083
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      seat-inventory-service:
        condition: service_started

  payment-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_MODULE: payment-service
    ports:
      - "8085:8085"
    environment:
      SERVER_PORT: 8085
      PAYMENT_WEBHOOK_SECRET: dev-webhook-secret
    depends_on:
      kafka:
        condition: service_healthy

  notification-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_MODULE: notification-service
    ports:
      - "8086:8086"
    environment:
      SERVER_PORT: 8086
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      kafka:
        condition: service_healthy

  booking-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_MODULE: booking-service
    ports:
      - "8084:8084"
    environment:
      SERVER_PORT: 8084
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/bookingdb
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.postgresql.Driver
      SPRING_DATASOURCE_USERNAME: ticketbook
      SPRING_DATASOURCE_PASSWORD: ticketbook
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_SHOW_SQL: false
      SERVICES_SEAT_INVENTORY_URL: http://seat-inventory-service:8083
      SERVICES_PAYMENT_URL: http://payment-service:8085
      SERVICES_NOTIFICATION_URL: http://notification-service:8086
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      postgres:
        condition: service_healthy
      seat-inventory-service:
        condition: service_started
      payment-service:
        condition: service_started
      notification-service:
        condition: service_started

  prometheus:
    image: prom/prometheus:v3.2.1
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    depends_on:
      - auth-service
      - event-management-service
      - seat-inventory-service
      - booking-service
      - payment-service
      - notification-service

  grafana:
    image: grafana/grafana:11.5.2
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus

volumes:
  postgres-data:
  redis-data:
  mongodb-data:
  kafka-data:
  prometheus-data:
  grafana-data:
